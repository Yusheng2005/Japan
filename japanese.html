<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文五十音練習</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --hover-color: #45a049;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 28px;
        }

        /* 設定區塊樣式 */
        .setting-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .setting-group h3 {
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        /* 為了容納更多選項而新增的捲軸區塊 */
        .scroll-box {
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            padding: 10px;
            border-radius: 6px;
            background-color: #fafafa;
        }

        /* 美化捲軸 */
        .scroll-box::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-box::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 3px;
        }

        .category-title {
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0 5px 0;
            font-size: 14px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 3px;
        }

        .category-title:first-child {
            margin-top: 0;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
        }

        .checkbox-item label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        
        /* 拉桿樣式 */
        input[type=range] {
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        button.start-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button.start-btn:hover {
            background-color: var(--hover-color);
        }

        /* 測驗區塊樣式 */
        #quiz-screen {
            display: none;
        }

        .question-box {
            font-size: 80px;
            font-weight: bold;
            margin: 30px 0;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: #e0e0e0;
            border: none;
            padding: 15px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: #d0d0d0;
        }

        .option-btn.correct {
            background-color: #4CAF50 !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: #f44336 !important;
            color: white;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            font-weight: bold;
        }

        .back-btn {
            background-color: transparent;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 設定畫面 -->
    <div id="setup-screen">
        <h1>五十音進階練習</h1>
        
        <div class="setting-group">
            <h3>1. 選擇模式</h3>
            <label><input type="radio" name="mode" value="1" checked> 日文 ➔ 羅馬拼音</label><br>
            <label><input type="radio" name="mode" value="2"> 羅馬拼音 ➔ 日文</label>
        </div>

        <div class="setting-group">
            <h3>2. 選擇字體</h3>
            <label><input type="radio" name="charType" value="hiragana" checked> 平假名 (あ, い...)</label><br>
            <label><input type="radio" name="charType" value="katakana"> 片假名 (ア, イ...)</label>
        </div>

        <div class="setting-group">
            <h3>
                <span>3. 選擇範圍</span>
                <span>
                    <button type="button" onclick="selectAll(true)" style="font-size:12px; cursor:pointer;">全選</button> 
                    <button type="button" onclick="selectAll(false)" style="font-size:12px; cursor:pointer;">全不選</button>
                </span>
            </h3>
            <!-- 修改：加上 scroll-box 以限制高度並加入捲軸 -->
            <div class="scroll-box" id="range-checkboxes">
                <!-- 透過 JS 動態產生分類與核取方塊 -->
            </div>
        </div>

        <div class="setting-group">
            <h3>
                <span>4. 測驗題數</span>
                <span style="color: var(--primary-color);"><span id="limit-display">20</span> 題</span>
            </h3>
            <input type="range" id="question-limit" min="5" max="100" step="5" value="20" oninput="updateLimitDisplay(this.value)">
        </div>

        <button class="start-btn" onclick="startQuiz()">開始練習</button>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen">
        <div class="status-bar">
            <span id="score-display">分數: 0</span>
            <span id="count-display">第 1 / 20 題</span>
        </div>
        
        <div class="question-box" id="question-text">あ</div>
        
        <div class="options-grid" id="options-container">
            <!-- 選項按鈕會由 JS 產生 -->
        </div>

        <button class="back-btn" onclick="goBack()">強制結束</button>
    </div>
</div>

<script>
    // 擴充版五十音資料庫 (加入濁音、半濁音、拗音)
    // 註：為了區分，ぢ設為di，づ設為du
    const gojuonData =[
        // 清音 (0-10)
        { label: 'あ行', items:[{h:'あ',k:'ア',r:'a'}, {h:'い',k:'イ',r:'i'}, {h:'う',k:'ウ',r:'u'}, {h:'え',k:'エ',r:'e'}, {h:'お',k:'オ',r:'o'}] },
        { label: 'か行', items:[{h:'か',k:'カ',r:'ka'}, {h:'き',k:'キ',r:'ki'}, {h:'く',k:'ク',r:'ku'}, {h:'け',k:'ケ',r:'ke'}, {h:'こ',k:'コ',r:'ko'}] },
        { label: 'さ行', items:[{h:'さ',k:'サ',r:'sa'}, {h:'し',k:'シ',r:'shi'}, {h:'す',k:'ス',r:'su'}, {h:'せ',k:'セ',r:'se'}, {h:'そ',k:'ソ',r:'so'}] },
        { label: 'た行', items:[{h:'た',k:'タ',r:'ta'}, {h:'ち',k:'チ',r:'chi'}, {h:'つ',k:'ツ',r:'tsu'}, {h:'て',k:'テ',r:'te'}, {h:'と',k:'ト',r:'to'}] },
        { label: 'な行', items:[{h:'な',k:'ナ',r:'na'}, {h:'に',k:'ニ',r:'ni'}, {h:'ぬ',k:'ヌ',r:'nu'}, {h:'ね',k:'ネ',r:'ne'}, {h:'の',k:'ノ',r:'no'}] },
        { label: 'は行', items:[{h:'は',k:'ハ',r:'ha'}, {h:'ひ',k:'ヒ',r:'hi'}, {h:'ふ',k:'フ',r:'fu'}, {h:'へ',k:'ヘ',r:'he'}, {h:'ほ',k:'ホ',r:'ho'}] },
        { label: 'ま行', items:[{h:'ま',k:'マ',r:'ma'}, {h:'み',k:'ミ',r:'mi'}, {h:'む',k:'ム',r:'mu'}, {h:'め',k:'メ',r:'me'}, {h:'も',k:'モ',r:'mo'}] },
        { label: 'や行', items:[{h:'や',k:'ヤ',r:'ya'}, {h:'ゆ',k:'ユ',r:'yu'}, {h:'よ',k:'ヨ',r:'yo'}] },
        { label: 'ら行', items:[{h:'ら',k:'ラ',r:'ra'}, {h:'り',k:'リ',r:'ri'}, {h:'る',k:'ル',r:'ru'}, {h:'れ',k:'レ',r:'re'}, {h:'ろ',k:'ロ',r:'ro'}] },
        { label: 'わ行', items:[{h:'わ',k:'ワ',r:'wa'}, {h:'を',k:'ヲ',r:'wo'}] },
        { label: 'ん',   items:[{h:'ん',k:'ン',r:'n'}] },
        
        // 濁音 (11-14)
        { label: 'が行', items:[{h:'が',k:'ガ',r:'ga'}, {h:'ぎ',k:'ギ',r:'gi'}, {h:'ぐ',k:'グ',r:'gu'}, {h:'げ',k:'ゲ',r:'ge'}, {h:'ご',k:'ゴ',r:'go'}] },
        { label: 'ざ行', items:[{h:'ざ',k:'ザ',r:'za'}, {h:'じ',k:'ジ',r:'ji'}, {h:'ず',k:'ズ',r:'zu'}, {h:'ぜ',k:'ゼ',r:'ze'}, {h:'ぞ',k:'ゾ',r:'zo'}] },
        { label: 'だ行', items:[{h:'だ',k:'ダ',r:'da'}, {h:'ぢ',k:'ヂ',r:'di'}, {h:'づ',k:'ヅ',r:'du'}, {h:'で',k:'デ',r:'de'}, {h:'ど',k:'ド',r:'do'}] },
        { label: 'ば行', items:[{h:'ば',k:'バ',r:'ba'}, {h:'び',k:'ビ',r:'bi'}, {h:'ぶ',k:'ブ',r:'bu'}, {h:'べ',k:'ベ',r:'be'}, {h:'ぼ',k:'ボ',r:'bo'}] },
        
        // 半濁音 (15)
        { label: 'ぱ行', items:[{h:'ぱ',k:'パ',r:'pa'}, {h:'ぴ',k:'ピ',r:'pi'}, {h:'ぷ',k:'プ',r:'pu'}, {h:'ぺ',k:'ペ',r:'pe'}, {h:'ぽ',k:'ポ',r:'po'}] },
        
        // 拗音 (16-26)
        { label: 'きゃ行', items:[{h:'きゃ',k:'キャ',r:'kya'}, {h:'きゅ',k:'キュ',r:'kyu'}, {h:'きょ',k:'キョ',r:'kyo'}] },
        { label: 'ぎゃ行', items:[{h:'ぎゃ',k:'ギャ',r:'gya'}, {h:'ぎゅ',k:'ギュ',r:'gyu'}, {h:'ぎょ',k:'ギョ',r:'gyo'}] },
        { label: 'しゃ行', items:[{h:'しゃ',k:'シャ',r:'sha'}, {h:'しゅ',k:'シュ',r:'shu'}, {h:'しょ',k:'ショ',r:'sho'}] },
        { label: 'じゃ行', items:[{h:'じゃ',k:'ジャ',r:'ja'}, {h:'じゅ',k:'ジュ',r:'ju'}, {h:'じょ',k:'ジョ',r:'jo'}] },
        { label: 'ちゃ行', items:[{h:'ちゃ',k:'チャ',r:'cha'}, {h:'ちゅ',k:'チュ',r:'chu'}, {h:'ちょ',k:'チョ',r:'cho'}] },
        { label: 'にゃ行', items:[{h:'にゃ',k:'ニャ',r:'nya'}, {h:'にゅ',k:'ニュ',r:'nyu'}, {h:'にょ',k:'ニョ',r:'nyo'}] },
        { label: 'ひゃ行', items:[{h:'ひゃ',k:'ヒャ',r:'hya'}, {h:'ひゅ',k:'ヒュ',r:'hyu'}, {h:'ひょ',k:'ヒョ',r:'hyo'}] },
        { label: 'びゃ行', items:[{h:'びゃ',k:'ビャ',r:'bya'}, {h:'びゅ',k:'ビュ',r:'byu'}, {h:'びょ',k:'ビョ',r:'byo'}] },
        { label: 'ぴゃ行', items:[{h:'ぴゃ',k:'ピャ',r:'pya'}, {h:'ぴゅ',k:'ピュ',r:'pyu'}, {h:'ぴょ',k:'ピョ',r:'pyo'}] },
        { label: 'みゃ行', items:[{h:'みゃ',k:'ミャ',r:'mya'}, {h:'みゅ',k:'ミュ',r:'myu'}, {h:'みょ',k:'ミョ',r:'myo'}] },
        { label: 'りゃ行', items:[{h:'りゃ',k:'リャ',r:'rya'}, {h:'りゅ',k:'リュ',r:'ryu'}, {h:'りょ',k:'リョ',r:'ryo'}] }
    ];

    // 初始化介面：透過分類動態生成核取方塊
    const categories =[
        { name: '清音', start: 0, end: 10 },
        { name: '濁音 / 半濁音', start: 11, end: 15 },
        { name: '拗音', start: 16, end: 26 }
    ];

    const checkboxContainer = document.getElementById('range-checkboxes');
    
    categories.forEach(cat => {
        // 加入分類標題
        const title = document.createElement('div');
        title.className = 'category-title';
        title.innerText = cat.name;
        checkboxContainer.appendChild(title);

        // 加入該分類的選項網格
        const grid = document.createElement('div');
        grid.className = 'checkbox-grid';
        
        for (let i = cat.start; i <= cat.end; i++) {
            const group = gojuonData[i];
            const div = document.createElement('div');
            div.className = 'checkbox-item';
            // 預設僅先勾選最前面的「あ行」
            const checkedStr = i === 0 ? 'checked' : '';
            div.innerHTML = `<label><input type="checkbox" value="${i}" class="range-cb" ${checkedStr}> ${group.label}</label>`;
            grid.appendChild(div);
        }
        checkboxContainer.appendChild(grid);
    });

    function selectAll(check) {
        document.querySelectorAll('.range-cb').forEach(cb => cb.checked = check);
    }

    function updateLimitDisplay(val) {
        document.getElementById('limit-display').innerText = val;
    }

    // 陣列洗牌函數
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 遊戲狀態變數
    let currentPool = [];
    let questionBag =[]; 
    let previousQuestion = null; 
    
    let currentMode = '1'; 
    let charType = 'hiragana';
    let score = 0;
    let questionCount = 0;
    let maxQuestions = 20;
    let currentQuestion = null;

    // 取得日文字元的幫助函數 (依照平假/片假設定)
    const getJpChar = (item) => charType === 'hiragana' ? item.h : item.k;

    // 開始測驗
    function startQuiz() {
        currentPool =[];
        const checkboxes = document.querySelectorAll('.range-cb:checked');
        
        checkboxes.forEach(cb => {
            const index = parseInt(cb.value);
            currentPool = currentPool.concat(gojuonData[index].items);
        });

        if (currentPool.length < 3) {
            alert('請至少選擇包含 3 個字元以上的範圍！');
            return;
        }

        currentMode = document.querySelector('input[name="mode"]:checked').value;
        charType = document.querySelector('input[name="charType"]:checked').value;
        maxQuestions = parseInt(document.getElementById('question-limit').value);
        
        questionBag = [...currentPool];
        shuffleArray(questionBag);
        previousQuestion = null;

        score = 0;
        questionCount = 0;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        nextQuestion();
    }

    // 產生下一題
    function nextQuestion() {
        questionCount++;
        document.getElementById('score-display').innerText = `分數: ${score}`;
        document.getElementById('count-display').innerText = `第 ${questionCount} / ${maxQuestions} 題`;

        // 1. 從「抽籤筒」選出正確答案
        if (questionBag.length === 0) {
            questionBag = [...currentPool];
            shuffleArray(questionBag);
            if (questionBag[questionBag.length - 1] === previousQuestion && questionBag.length > 1) {
                let temp = questionBag[questionBag.length - 1];
                questionBag[questionBag.length - 1] = questionBag[0];
                questionBag[0] = temp;
            }
        }
        
        currentQuestion = questionBag.pop();
        previousQuestion = currentQuestion;

        // 2. 嚴謹地選出兩個錯誤答案 (確保外觀文字與羅馬音都不會跟答案或彼此重複)
        let wrongOptions =[];
        while (wrongOptions.length < 2) {
            const randomIdx = Math.floor(Math.random() * currentPool.length);
            const candidate = currentPool[randomIdx];
            
            const isDuplicateItem = candidate === currentQuestion || wrongOptions.includes(candidate);
            const isDuplicateText = candidate.r === currentQuestion.r || getJpChar(candidate) === getJpChar(currentQuestion);
            const isDuplicateInWrongOpts = wrongOptions.some(opt => opt.r === candidate.r || getJpChar(opt) === getJpChar(candidate));

            if (!isDuplicateItem && !isDuplicateText && !isDuplicateInWrongOpts) {
                wrongOptions.push(candidate);
            }
        }

        // 3. 組合三個選項並打亂順序
        let options = [currentQuestion, wrongOptions[0], wrongOptions[1]];
        shuffleArray(options);

        // 4. 更新畫面
        const questionEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        if (currentMode === '1') {
            questionEl.innerText = getJpChar(currentQuestion);
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.r;
                btn.onclick = () => checkAnswer(btn, opt.r, currentQuestion.r);
                optionsContainer.appendChild(btn);
            });
        } else {
            questionEl.innerText = currentQuestion.r;
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = getJpChar(opt);
                btn.onclick = () => checkAnswer(btn, getJpChar(opt), getJpChar(currentQuestion));
                optionsContainer.appendChild(btn);
            });
        }
    }

    // 檢查答案
    function checkAnswer(clickedBtn, selectedVal, correctVal) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true);

        if (selectedVal === correctVal) {
            clickedBtn.classList.add('correct');
            score++;
            document.getElementById('score-display').innerText = `分數: ${score}`;
        } else {
            clickedBtn.classList.add('wrong');
            allBtns.forEach(btn => {
                if (btn.innerText === correctVal) {
                    btn.classList.add('correct');
                }
            });
        }

        setTimeout(() => {
            if (questionCount >= maxQuestions) {
                const accuracy = Math.round((score / maxQuestions) * 100);
                alert(`🎯 測驗結束！\n\n總題數：${maxQuestions} 題\n答對了：${score} 題\n正確率：${accuracy}%`);
                goBack();
            } else {
                nextQuestion();
            }
        }, 400); // 0.4 秒換題
    }

    // 返回設定
    function goBack() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
    }
</script>

</body>
</html>
